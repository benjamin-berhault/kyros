services:

  local-registry:
    container_name: local-registry
    build:
      context: ./docker/local-registry
      args:
        IMAGE: alpine:3.16
    ports:
      - "5000:5000"  # HTTPS Docker registry exposed on port 5000
      - "5001:5001"  # HTTPS NGINX exposed on port 5001 for JAR files
    volumes:
      # Local volume to store Docker images
      - ./docker/local-registry/images:/var/lib/registry   
      # Local volume to store JAR files
      - ./docker/local-registry/jars:/usr/share/nginx/html/jars  
    healthcheck:
      test: ["CMD-SHELL", "curl -k http://localhost:5000/v2/ || exit 1"]  # Use HTTPS in health check
      interval: 10s
      retries: 5
      start_period: 20s
      timeout: 5s
