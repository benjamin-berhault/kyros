[desktop]
  [[database]]
    engine=sqlite3
    name=/hue/desktop/desktop.db

[beeswax]
  hive_server_host=spark-thrift-server  # Hostname of the Spark Thrift Server
  hive_server_port=10000                # Port of the Spark Thrift Server
  auth_username=hue                     # Optional: Username for authentication
  auth_password=hue_password            # Optional: Password for authentication
  use_sasl=false                        # Set to true if using SASL for authentication
  auth_mechanism=PLAIN                  # Use PLAIN if not using Kerberos

[notebook]
  [[interpreters]]
    [[[hiveserver2]]]
      name=SparkSQL                     # The display name for the interpreter
      interface=hiveserver2             # Interface type for Spark Thrift Server
