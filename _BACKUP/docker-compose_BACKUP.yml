volumes:
  shared-workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/shared-workspace

  delta-tables:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/delta-tables

  # minio-data:
  #   driver: local

networks:
  my-network:
    driver: bridge