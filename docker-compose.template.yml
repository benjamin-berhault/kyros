version: '3.8'

services:
  web:
    build: ./docker/app
    container_name: web
    ports:
      - "5000:5000"
    depends_on:
      - kafka
      - jupyterlab
      - spark-master
{{SPARK_WORKER_DEPENDENCIES}}
      - hue
    networks:
      - my-network

  kafka:
    container_name: kafka
    image: docker.io/bitnami/kafka:3.5.1
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      - BITNAMI_DEBUG=yes
      - KAFKA_ENABLE_KRAFT=true
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:29092
      - KAFKA_CFG_LISTENERS=PLAINTEXT://kafka:9092,CONTROLLER://kafka:29092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes

  jupyterlab:
    container_name: jupyterlab
    build:
      context: ./docker/jupyterlab
      args:
        BASE_IMAGE: jupyter/base-notebook:latest
        spark_version: 3.4.1
        jupyterlab_version: 4.2.4
        sparksql_magic_version: 0.0.3
        kafka_python_version: 2.0.2
    environment:
      - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
    ports:
      - 8888:8888  # JupyterLab web interface
      - 4045:4040  # Spark UI inside JupyterLab container (changed from 4040 to 4045 on host)
    volumes:
      - shared-workspace:/home/jovyan/work
      - delta_lake:/home/jovyan/delta_lake
    depends_on:
      - spark-master
    networks:
      - my-network

  spark-master:
    container_name: spark-master
    build:
      context: ./docker/spark-master
      args:
        SPARK_BASE_IMAGE: bitnami/spark:3.4.1
    ports:
      - 8080:8080  # Spark Master Web UI
      - 7077:7077  # Spark Master Port
      - 4040:4040  # Spark Master UI Port
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_UI_PORT=4040  # Explicitly set UI port for Spark Master
    volumes:
      - shared-workspace:/home/jovyan/work
      - delta_lake:/home/jovyan/delta_lake
    networks:
      - my-network

{{SPARK_WORKER_SERVICES}}

  # hive-metastore:
  #   container_name: hive-metastore
  #   build:
  #     context: ./docker/hive-metastore
  #   environment:
  #     - HIVE_CONF_DIR=/opt/hive/conf
  #     - "HIVE_METASTORE_URI=thrift://hive-metastore:9083"
  #     - "HIVE_METASTORE_DB_TYPE=postgres"
  #     - "HIVE_METASTORE_DB_HOST=postgres"
  #     - "HIVE_METASTORE_DB_PORT=5432"
  #     - "HIVE_METASTORE_DB_NAME=metastore"
  #     - "HIVE_METASTORE_DB_USER=metastore_user"
  #     - "HIVE_METASTORE_DB_PASSWORD=metastore_password"
  #   ports:
  #     - "9083:9083"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - my-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:9083 || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  hive-server2:
    image: apache/hive:4.0.0
    container_name: hive-server2
    environment:
      - HIVE_CONF_DIR=/opt/hive/conf
    ports:
      - "10001:10000"
    depends_on:
      - hive-metastore
      - postgres
    networks:
      - my-network
    command: /opt/hive/bin/hive --service hiveserver2
    
  hive-metastore:
    image: apache/hive:4.0.0
    container_name: hive-metastore
    environment:
      - SERVICE_NAME=metastore
      - HIVE_METASTORE_USER=metastore_user
      - HIVE_METASTORE_PASSWORD=metastore_password
      - HIVE_METASTORE_DB_TYPE=postgres
      - HIVE_METASTORE_DB_HOST=postgres
      - HIVE_METASTORE_DB_PORT=5432
      - HIVE_METASTORE_DB_NAME=metastore
      - HIVE_METASTORE_DB_USER=metastore_user
      - HIVE_METASTORE_DB_PASSWORD=metastore_password
    ports:
      - "9083:9083"
    depends_on:
      - postgres
    networks:
      - my-network

  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      - POSTGRES_DB=metastore
      - POSTGRES_USER=metastore_user
      - POSTGRES_PASSWORD=metastore_password
    ports:
      - "5432:5432"
    networks:
      - my-network

  spark-thrift-server:
    image: bitnami/spark:3.4.1
    container_name: spark-thrift-server
    entrypoint:
      - "/bin/bash"
      - "-c"
      - |
        /opt/spark/sbin/start-thriftserver.sh --master spark://${SPARK_MASTER_HOST}:${SPARK_MASTER_PORT} --hiveconf hive.server2.thrift.bind.host=0.0.0.0 --hiveconf hive.server2.thrift.port=10000
    depends_on:
      - spark-master
      - hive-metastore
    ports:
      - "10000:10000"
    networks:
      - my-network

  hue:
    container_name: hue
    image: gethue/hue:latest
    ports:
      - "8889:8888"  # Hue web interface
    environment:
      - HUE_DATABASE_ENGINE=sqlite3
      - HUE_DATABASE_NAME=hue
      - HUE_DATABASE_USER=hue
      - HUE_DATABASE_PASSWORD=hue_password
    volumes:
      - shared-workspace:/home/jovyan/work
    depends_on:
      - spark-master
      - hive-metastore
    networks:
      - my-network

volumes:
  shared-workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/shared-workspace

  delta_lake:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/delta_lake

networks:
  my-network:
    driver: bridge
