  cloudbeaver:
    container_name: cloudbeaver
    build:
      context: ./docker/cloudbeaver
      args: 
        IMAGE: ${IF_USING_LOCAL_REGISTRY}dbeaver/cloudbeaver:24.2.0
    environment:
      - CB_SERVER_NAME=CloudBeaver
      - CB_ADMIN_NAME=admin
      - CB_ADMIN_PASSWORD=admin_password
    ports:
      - "8978:8978"
    # volumes:
    #   - cloudbeaver_data:/opt/cloudbeaver/workspace
    networks:
      - my-network
 
  kyros:
    container_name: kyros
    build:
      context: ./docker/kyros
    ports:
      - "5005:5005"  # Exposing port 80 (Nginx) on port 5005 of the host
    volumes:
      - ./docker/kyros/app:/app  # Volume for your Flask app
      - ./docker/kyros/nginx.conf:/etc/nginx/nginx.conf  # Nginx configuration
    networks:
      - my-network
    environment:
      - FLASK_ENV=dev
 
  dagster:
    container_name: dagster
    build:
      context: ./docker/dagster
      args: 
        IMAGE: ${IF_USING_LOCAL_REGISTRY}python:3.11-slim
    environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        DAGSTER_HOME: /dagster/postcard_company_dm
    volumes:
        - data:/shared
        - ./docker/dagster/postcard_company_dm:/dagster/postcard_company_dm
    ports:
        - "3000:3000"
    command: dagster-webserver -h 0.0.0.0
    depends_on:
      generator:
        condition: service_completed_successfully
    networks:
      - my-network

