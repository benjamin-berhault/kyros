services:
  web:
    build: ./docker/app
    container_name: web
    ports:
      - "5000:5000"
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2

    networks:
      - my-network

  jupyterlab:
    container_name: jupyterlab
    build:
      context: ./docker/jupyterlab
      args:
        BASE_IMAGE: jupyter/base-notebook:latest
        spark_version: 3.4.1
        jupyterlab_version: 4.2.4
        sparksql_magic_version: 0.0.3
        kafka_python_version: 2.0.2
    environment:
      - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
    ports:
      - 8888:8888
      - 4045:4040
    volumes:
      - ./shared-workspace:/home/jovyan/work
      - ./data/delta_lake:/home/jovyan/delta_lake
      - ./data/parquet:/home/jovyan/parquet
      - ./data/iceberg:/home/jovyan/iceberg
    depends_on:
      - spark-master
    networks:
      - my-network
 
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      #- portainer_data:/data
    environment:
      - ADMIN_PASSWORD=admin  # Set the admin password
    networks:
      - my-network
 


  spark-master:
    container_name: spark-master
    build:
      context: ./docker/spark-master
      args:
        SPARK_BASE_IMAGE: bitnami/spark:3.4.1
    ports:
      - 8080:8080  # Spark Master Web UI
      - 7077:7077  # Spark Master Port
      - 4040:4040  # Spark Master UI Port
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_UI_PORT=4040  # Explicitly set UI port for Spark Master
    volumes:
      - shared-workspace:/home/jovyan/work
      - ./data/delta_lake:/home/jovyan/delta_lake
      - ./data/parquet:/home/jovyan/parquet
      - ./data/iceberg:/home/jovyan/iceberg
    networks:
      - my-network

  spark-worker-1:
    container_name: spark-worker-1
    build:
      context: ./docker/spark-worker
      args:
        SPARK_BASE_IMAGE: bitnami/spark:3.4.1
    ports:
      - 8081:8081  # Spark Worker 1 Web UI
      - 4041:4041  # Spark Worker 1 UI Port
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=1G
      - SPARK_EXECUTOR_MEMORY=1G
      - SPARK_EXECUTOR_CORES=2
      - SPARK_UI_PORT=4041
    volumes:
      - ./shared-workspace:/home/jovyan/work
      - ./data/delta_lake:/home/jovyan/delta_lake
      - ./data/parquet:/home/jovyan/parquet
      - ./data/iceberg:/home/jovyan/iceberg
    depends_on:
      - spark-master
    networks:
      - my-network

  spark-worker-2:
    container_name: spark-worker-2
    build:
      context: ./docker/spark-worker
      args:
        SPARK_BASE_IMAGE: bitnami/spark:3.4.1
    ports:
      - 8082:8082  # Spark Worker 2 Web UI
      - 4042:4042  # Spark Worker 2 UI Port
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=1G
      - SPARK_EXECUTOR_MEMORY=1G
      - SPARK_EXECUTOR_CORES=2
      - SPARK_UI_PORT=4042
    volumes:
      - ./shared-workspace:/home/jovyan/work
      - ./data/delta_lake:/home/jovyan/delta_lake
      - ./data/parquet:/home/jovyan/parquet
      - ./data/iceberg:/home/jovyan/iceberg
    depends_on:
      - spark-master
    networks:
      - my-network



