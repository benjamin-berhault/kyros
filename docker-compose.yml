  dbt:
    container_name: dbt
    build:
      context: ./docker/dbt  # Points to the folder containing the Dockerfile
      args: 
        IMAGE: python:3.10-alpine
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt/profiles
      SPARK_HOST: spark-master
      SPARK_PORT: 7077
    volumes:
      - ./data/dbt_project:/usr/app/dbt  # Mount your dbt project directory
    depends_on:
      - spark-master
    networks:
      - my-network
 
  minio:
    container_name: minio
    build:
      context: ./docker/minio  # Path to your Dockerfile
    hostname: minio
    ports:
      - "9003:9003"  # Expose Nginx on port 9003
      - "9001:9001"  # Expose MinIO console on port 9001 (optional)
    #volumes:
    #  - ./docker/minio/data:/data
    environment:
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
    networks:
      - my-network

  minio-client:
    container_name: minio-client
    build:
      context: ./docker/minio-client
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}alpine:3.20.3
    environment:
      MINIO_HOST: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      BUCKET_NAMES: raw-data,processed-data,delta-data,iceberg-data,models,logs,backups
    networks:
      - my-network
    depends_on:
      - minio
 
  code-server:
    container_name: code-server
    build:
      context: ./docker/code-server
    environment:
      - PASSWORD=yourpassword  # Password to access code-server
      - SUDO_PASSWORD=yourpassword  # Sudo password for user `coder`
    ports:
      - "8083:8080"  # Map the default code-server port
    volumes:
      # Mounting the Docker Socket: Mounting /var/run/docker.sock allows the container 
      # to communicate with the Docker daemon on the host system.
      - /var/run/docker.sock:/var/run/docker.sock  # Mount Docker socket
      - ./data/dbt_project:/home/coder/dbt_project  # Shared volume with the dbt container
      - ./docker/code-server/project:/home/coder/project  # Mount the project directory
      - ./docker/code-server/settings.json:/home/coder/.local/share/code-server/User/settings.json  # Mount settings.json for custom configurations
    networks:
      - my-network
 
  generator:
    container_name: generator
    build:
      context: ./docker/generator
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}python:3.9-slim
        POSTGRES_USER: $POSTGRES_USER
        POSTGRES_PASSWORD: $POSTGRES_PASSWORD
    volumes:
      - data:/shared
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - my-network
 

  postgres:
    container_name: postgres
    build:
      context: ./docker/postgres
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}postgres:16.4
    environment:
      #- POSTGRES_DB=metastore
      #- POSTGRES_USER=metastore_user
      #- POSTGRES_PASSWORD=metastore_password
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - METASTORE_USER=metastore_user
      - METASTORE_PASSWORD=metastore_password
      - METASTORE_DB=metastore
      - SPARK_USER=spark_user
      - SPARK_PASSWORD=spark_password
      - DAGSTER_ROLE=dagster
      - DAGSTER_PASSWORD=dagsterpassword
      - DAGSTER_DB=dagster
      - SANDPIT_USER=test_user
      - SANDPIT_PASSWORD=test_password
      - SANDPIT_DB=testdb
      #- SQLPAD_USER=sqlpad
      #- SQLPAD_PASSWORD=sqlpadpass
      #- SQLPAD_DB=sqlpaddb
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/test-data-sample.sql:/docker-entrypoint-initdb.d/test-data-sample.sql
    networks:
      - my-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d sales_oltp --username $POSTGRES_USER"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 45s
 
  superset:
    build:
      context: ./docker/superset
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}apache/superset:3.1.3
        POSTGRES_USER: $POSTGRES_USER
        POSTGRES_PASSWORD: $POSTGRES_PASSWORD
        SUPERSET_ADMIN: $SUPERSET_ADMIN
        SUPERSET_PASSWORD: $SUPERSET_PASSWORD
        SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    ports:
        - "8088:8088"
    command:     gunicorn --bind  "0.0.0.0:8088" --access-logfile '-' --error-logfile '-' --workers 1 --worker-class gthread --threads 20 --timeout 60 --limit-request-line 0 --limit-request-field_size 0 "superset.app:create_app()"
    volumes:
        - ./shared/db:/app/superset_home/db
    depends_on:
      - dagster
    networks:
      - my-network
 


  spark-master:
    container_name: spark-master
    build:
      context: ./docker/spark-master
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}bitnami/spark:3.4.1
    ports:
      - 8080:8080  # Spark Master Web UI
      - 7077:7077  # Spark Master Port
      - 4040:4040  # Spark Master UI Port
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_UI_PORT=4040  # Explicitly set UI port for Spark Master
    volumes:
      - data:/home/jovyan/data
      - lab:/home/jovyan/lab
    networks:
      - my-network

  spark-worker-1:
    container_name: spark-worker-1
    build:
      context: ./docker/spark-worker
      args:
        SPARK_BASE_IMAGE: ${IF_USING_LOCAL_REGISTRY}bitnami/spark:3.4.1
    ports:
      - 8081:8081  # Spark Worker 1 Web UI
      - 4041:4041  # Spark Worker 1 UI Port
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=1G
      - SPARK_EXECUTOR_MEMORY=1G
      - SPARK_EXECUTOR_CORES=2
      - SPARK_UI_PORT=4041
    volumes:
      - data:/home/jovyan/data
      - lab:/home/jovyan/lab
    depends_on:
      - spark-master
    networks:
      - my-network

  spark-worker-2:
    container_name: spark-worker-2
    build:
      context: ./docker/spark-worker
      args:
        SPARK_BASE_IMAGE: ${IF_USING_LOCAL_REGISTRY}bitnami/spark:3.4.1
    ports:
      - 8082:8082  # Spark Worker 2 Web UI
      - 4042:4042  # Spark Worker 2 UI Port
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=1G
      - SPARK_EXECUTOR_MEMORY=1G
      - SPARK_EXECUTOR_CORES=2
      - SPARK_UI_PORT=4042
    volumes:
      - data:/home/jovyan/data
      - lab:/home/jovyan/lab
    depends_on:
      - spark-master
    networks:
      - my-network



