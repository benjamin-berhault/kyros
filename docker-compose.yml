services:
  web:
    build:
      context: ./docker/app
      args:
        IMAGE: 
    container_name: web
    ports:
      - "5002:5000"
    depends_on:
      - spark-master

    networks:
      - my-network

  portainer:
    container_name: portainer
    build:
      context: ./docker/portainer
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}portainer/portainer-ce:2.21.1
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      #- portainer_data:/data
    environment:
      - ADMIN_PASSWORD=your_password
    networks:
      - my-network
 
  cloudbeaver:
    container_name: cloudbeaver
    build:
      context: ./docker/cloudbeaver
      args: 
        IMAGE: ${IF_USING_LOCAL_REGISTRY}dbeaver/cloudbeaver:24.2.0
    environment:
      - CB_SERVER_NAME=CloudBeaver
      - CB_ADMIN_NAME=admin
      - CB_ADMIN_PASSWORD=admin_password
    ports:
      - "8978:8978"
    # volumes:
    #   - cloudbeaver_data:/opt/cloudbeaver/workspace
    networks:
      - my-network
 
  sqlpad:
    container_name: sqlpad
    build:
      context: ./docker/sqlpad
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}sqlpad/sqlpad:7.5.0
    environment:
      - SQLPAD_PORT=3001
      - SQLPAD_ADMIN=admin@example.com
      - SQLPAD_ADMIN_PASSWORD=admin
      - SQLPAD_AUTH_DISABLED=false
      - SQLPAD_BASE_URL=/sqlpad    # Base URL if behind a reverse proxy
    ports:
      - "3001:3001"
    # volumes:
    #   - ./docker/sqlpad/data:/var/lib/sqlpad  # Persistent storage for SQLPad data
    networks:
      - my-network
 
  kyros:
    container_name: kyros
    build:
      context: ./docker/kyros
    ports:
      - "5005:5005"  # Exposing port 80 (Nginx) on port 5005 of the host
    volumes:
      - ./docker/kyros/app:/app  # Volume for your Flask app
      - ./docker/kyros/nginx.conf:/etc/nginx/nginx.conf  # Nginx configuration
    networks:
      - my-network
    environment:
      - FLASK_ENV=dev
 
  dagster:
    container_name: dagster
    build:
      context: ./docker/dagster
      args: 
        IMAGE: ${IF_USING_LOCAL_REGISTRY}python:3.11-slim
    environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        DAGSTER_HOME: /dagster/postcard_company_dm
    volumes:
        - data:/shared
        - ./docker/dagster/postcard_company_dm:/dagster/postcard_company_dm
    ports:
        - "3000:3000"
    command: dagster-webserver -h 0.0.0.0
    # depends_on:
    #   generator:
    #     condition: service_completed_successfully
    networks:
      - my-network

  # dagster:
  #   container_name: dagster
  #   build:
  #     context: ./docker/dagster
  #     args: 
  #       IMAGE: ${IF_USING_LOCAL_REGISTRY}python:3.11-slim
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - DAGSTER_WORKSPACE_PATH=/opt/dagster-projects/${DAGSTER_WORKSPACE}/workspace.yaml
  #   depends_on:
  #     - postgres
  #   networks:
  #     - my-network
  #   volumes:
  #     - dagster-project:/opt/dagster/app
    #   - ./pyflink:/opt/pyflink
      
 
  dbt:
    container_name: dbt
    build:
      context: ./docker/dbt  # Points to the folder containing the Dockerfile
      args: 
        IMAGE: python:3.10-alpine
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt/profiles
      SPARK_HOST: spark-master
      SPARK_PORT: 7077
    volumes:
      - ./data/dbt_project:/usr/app/dbt  # Mount your dbt project directory
    depends_on:
      - spark-master
    networks:
      - my-network
 

  postgres:
    container_name: postgres
    build:
      context: ./docker/postgres
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}postgres:16.4
    environment:
      #- POSTGRES_DB=metastore
      #- POSTGRES_USER=metastore_user
      #- POSTGRES_PASSWORD=metastore_password
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - METASTORE_USER=metastore_user
      - METASTORE_PASSWORD=metastore_password
      - METASTORE_DB=metastore
      - SPARK_USER=spark_user
      - SPARK_PASSWORD=spark_password
      - DAGSTER_ROLE=dagster
      - DAGSTER_PASSWORD=dagsterpassword
      - DAGSTER_DB=dagster
      - SANDPIT_USER=test_user
      - SANDPIT_PASSWORD=test_password
      - SANDPIT_DB=testdb
      #- SQLPAD_USER=sqlpad
      #- SQLPAD_PASSWORD=sqlpadpass
      #- SQLPAD_DB=sqlpaddb
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/test-data-sample.sql:/docker-entrypoint-initdb.d/test-data-sample.sql
    networks:
      - my-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d sales_oltp --username $POSTGRES_USER"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 45s
 
  superset:
    container_name: superset
    build:
      context: ./docker/superset
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}apache/superset:3.1.3
        POSTGRES_USER: $POSTGRES_USER
        POSTGRES_PASSWORD: $POSTGRES_PASSWORD
        SUPERSET_ADMIN: $SUPERSET_ADMIN
        SUPERSET_PASSWORD: $SUPERSET_PASSWORD
        SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    ports:
        - "8088:8088"
    command:     gunicorn --bind  "0.0.0.0:8088" --access-logfile '-' --error-logfile '-' --workers 1 --worker-class gthread --threads 20 --timeout 60 --limit-request-line 0 --limit-request-field_size 0 "superset.app:create_app()"
    volumes:
        - ./shared/db:/app/superset_home/db
    depends_on:
      - dagster
    networks:
      - my-network
 


  spark-master:
    container_name: spark-master
    build:
      context: ./docker/spark-master
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}bitnami/spark:3.4.1
    ports:
      - 8080:8080  # Spark Master Web UI
      - 7077:7077  # Spark Master Port
      - 4040:4040  # Spark Master UI Port
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_UI_PORT=4040  # Explicitly set UI port for Spark Master
    volumes:
      - data:/home/jovyan/data
      - lab:/home/jovyan/lab
    networks:
      - my-network



  # hive-metastore:
  #   container_name: hive-metastore
  #   build:
  #     context: ./docker/hive-metastore
  #   environment:
  #     - HIVE_CONF_DIR=/opt/hive/conf
  #     - "HIVE_METASTORE_URI=thrift://hive-metastore:9083"
  #     - "HIVE_METASTORE_DB_TYPE=postgres"
  #     - "HIVE_METASTORE_DB_HOST=postgres"
  #     - "HIVE_METASTORE_DB_PORT=5432"
  #     - "HIVE_METASTORE_DB_NAME=metastore"
  #     - "HIVE_METASTORE_DB_USER=metastore_user"
  #     - "HIVE_METASTORE_DB_PASSWORD=metastore_password"
  #   ports:
  #     - "9083:9083"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - my-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:9083 || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5

  # hive-server2:
  #   image: apache/hive:4.0.0
  #   container_name: hive-server2
  #   environment:
  #     - HIVE_CONF_DIR=/opt/hive/conf
  #   ports:
  #     - "10001:10000"
  #   depends_on:
  #     - hive-metastore
  #     - postgres
  #   networks:
  #     - my-network
  #   command: /opt/hive/bin/hive --service hiveserver2

  hive-metastore:
    container_name: hive-metastore
    build:
      context: ./docker/hive-metastore
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}apache/hive:4.0.0
    environment:
      - SERVICE_NAME=metastore
      - HIVE_METASTORE_USER=metastore_user
      - HIVE_METASTORE_PASSWORD=metastore_password
      - HIVE_METASTORE_DB_TYPE=postgres
      - HIVE_METASTORE_DB_HOST=postgres
      - HIVE_METASTORE_DB_PORT=5432
      - HIVE_METASTORE_DB_NAME=metastore
      - HIVE_METASTORE_DB_USER=metastore_user
      - HIVE_METASTORE_DB_PASSWORD=metastore_password
    ports:
      - "9083:9083"
    depends_on:
      - postgres
    networks:
      - my-network
      
  spark-thrift-server:
    container_name: spark-thrift-server
    build:
      context: ./docker/spark-thrift-server
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}bitnami/spark:3.4.1
        BASE_URL_JARS: ${BASE_URL_JARS}
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_HOME=/opt/bitnami/spark
    depends_on:
      - postgres
      - spark-master
      - spark-worker-1
      - hive-metastore
    ports:
      - "10000:10000"
    networks:
      - my-network

volumes:
  data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/data

  lab:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/lab

  dagster-project:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/orchestrate/dagster/${DAGSTER_WORKSPACE}

  transform:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/transform
  # delta_lake:
  #   driver: local
  #   driver_opts:
  #     type: none
  #     o: bind
  #     device: ${PWD}/delta_lake

  # ZEPPELIN_VOLUME_PLACEHOLDER

  minio-data:
    driver: local

  cloudbeaver_data:
    driver: local

networks:
  my-network:
    driver: bridge
