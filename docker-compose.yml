services:
  web:
    build:
      context: ./docker/app
      args:
        IMAGE: 
    container_name: web
    ports:
      - "5002:5000"
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2

    networks:
      - my-network

  jupyterlab:
    container_name: jupyterlab
    build:
      context: ./docker/jupyterlab
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}jupyter/base-notebook:latest
        spark_version: 3.4.1
        jupyterlab_version: 4.2.4
        sparksql_magic_version: 0.0.3
        kafka_python_version: 2.0.2
    environment:
      - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
    ports:
      - 8888:8888
      - 4045:4040
    volumes:
      - data:/home/jovyan/data
      - lab:/home/jovyan/lab
    networks:
      - my-network
 
  portainer:
    container_name: portainer
    build:
      context: ./docker/portainer
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}portainer/portainer-ce:2.21.1
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      #- portainer_data:/data
    environment:
      - ADMIN_PASSWORD=your_password
    networks:
      - my-network
 
  trino:
    container_name: trino
    hostname: trino
    build:
      context: ./docker/trino  # Points to the folder containing the Dockerfile
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}trinodb/trino:455
        BASE_URL_JARS: ${BASE_URL_JARS}
