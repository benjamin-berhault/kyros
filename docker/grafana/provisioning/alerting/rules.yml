apiVersion: 1

groups:
  - orgId: 1
    name: Kyros Platform Alerts
    folder: Kyros
    interval: 1m
    rules:
      # Service Health Alerts
      - uid: kyros-service-down
        title: Service Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({container_name=~".+"} |~ "error|Error|ERROR|fatal|Fatal|FATAL" [5m])'
              queryType: instant
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [50]
                  operator:
                    type: and
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: High error rate detected in logs
          description: More than 50 errors detected in the last 5 minutes across all services.
        labels:
          severity: warning

      # PostgreSQL Connection Alert
      - uid: kyros-postgres-errors
        title: PostgreSQL Errors
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({container_name="postgres"} |~ "ERROR|FATAL|PANIC" [5m])'
              queryType: instant
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
                  operator:
                    type: and
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: PostgreSQL errors detected
          description: PostgreSQL has logged {{ $value }} errors in the last 5 minutes.
        labels:
          severity: critical
          service: postgres

      # Dagster Pipeline Failures
      - uid: kyros-dagster-failures
        title: Dagster Pipeline Failures
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({container_name="dagster"} |~ "FAILURE|failed|Failed" [10m])'
              queryType: instant
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: Dagster pipeline failure detected
          description: A Dagster pipeline has failed. Check the Dagster UI for details.
        labels:
          severity: warning
          service: dagster

      # Spark Job Failures
      - uid: kyros-spark-failures
        title: Spark Job Failures
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({container_name=~"spark.*"} |~ "Exception|ERROR|failed" [10m])'
              queryType: instant
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
                  operator:
                    type: and
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: Spark job errors detected
          description: Spark has logged {{ $value }} errors in the last 10 minutes.
        labels:
          severity: warning
          service: spark

      # Container Restart Alert
      - uid: kyros-container-restart
        title: Container Restarting
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({container_name=~".+"} |~ "starting|Started|Initializing" [5m])'
              queryType: instant
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [20]
                  operator:
                    type: and
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: Containers restarting frequently
          description: Multiple container restarts detected, indicating possible instability.
        labels:
          severity: warning

      # MinIO Storage Alert
      - uid: kyros-minio-errors
        title: MinIO Storage Errors
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({container_name="minio"} |~ "ERROR|error|disk|storage" [5m])'
              queryType: instant
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
                  operator:
                    type: and
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: MinIO storage errors
          description: MinIO has reported storage-related errors. Check disk space and connectivity.
        labels:
          severity: critical
          service: minio
