worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server {
        listen 9003;
        server_name localhost;

        # Regular HTTP traffic
        location / {
            proxy_pass http://localhost:9001;
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "frame-ancestors *";
        }

    }
}
