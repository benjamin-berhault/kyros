<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        .iframe-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .iframe-top {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
        }
        .iframe-bottom-container {
            display: flex;
            gap: 20px;
        }
        .iframe-bottom {
            width: 50%;
            height: 400px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Spark Dashboard</h1>

    <div class="iframe-container">
        <!-- Spark Master on top -->
        <iframe class="iframe-top" src="http://localhost:8080"></iframe>

        <!-- Container for the bottom iframes (Workers side by side) -->
        <div class="iframe-bottom-container">
            <!-- Spark Worker 1 on the bottom left -->
            <iframe class="iframe-bottom" src="http://localhost:8081"></iframe>

            <!-- Spark Worker 2 on the bottom right -->
            <iframe class="iframe-bottom" src="http://localhost:8082"></iframe>
        </div>
    </div>
</body>
</html>
