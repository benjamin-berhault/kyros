worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Increase the maximum body size for larger requests
    client_max_body_size 16M;

    # Main server block to handle incoming requests
    server {
        listen 5005;  # Nginx listens on port 5005
        add_header X-Frame-Options "ALLOWALL" always;

        location / {
            proxy_pass http://127.0.0.1:5000;  # Forward traffic to Flask running on port 5000
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            

            # Handle WebSocket connections if needed
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }


