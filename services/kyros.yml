  kyros:
    container_name: kyros
    build:
      context: ./docker/kyros
    ports:
      - "5005:5005"  # Exposing port 80 (Nginx) on port 5005 of the host
    volumes:
      - ./docker/kyros/app:/app  # Volume for your Flask app
      - ./docker/kyros/nginx.conf:/etc/nginx/nginx.conf  # Nginx configuration
    networks:
      - my-network
    environment:
      - FLASK_ENV=dev
      - PORTAINER_PASSWORD=${PORTAINER_ADMIN_PASSWORD:-admin}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s