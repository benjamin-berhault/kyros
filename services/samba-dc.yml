  samba-ad:
    image: instantlinux/samba-dc
    container_name: samba-ad
    environment:
      DOMAIN: example.com               # Your domain name
      DOMAINPASS: StrongPassword123      # Domain admin password
      ADMINUSER: administrator           # Domain admin username
      DNS_FORWARDER: 8.8.8.8             # Forward DNS requests
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "88:88/tcp"
      - "88:88/udp"
      - "135:135/tcp"
      - "137-138:137-138/udp"
      - "139:139/tcp"
      - "389:389/tcp"                   # LDAP port
      - "445:445/tcp"                   # SMB port
      - "464:464/tcp"
      - "464:464/udp"
      - "636:636/tcp"
      - "3268-3269:3268-3269/tcp"
    volumes:
      - ./samba-config:/etc/samba        # Persistent storage for Samba config
      - ./samba-data:/var/lib/samba      # Persistent storage for Samba data
    restart: unless-stopped