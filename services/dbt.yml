  dbt:
    container_name: dbt
    build:
      context: ./docker/dbt  # Points to the folder containing the Dockerfile
      args: 
        IMAGE: ghcr.io/dbt-labs/dbt-core:1.5.latest
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt/profiles
      SPARK_HOST: spark-master
      SPARK_PORT: 7077
    volumes:
      - ./data/dbt_project:/usr/app/dbt  # Mount your dbt project directory
    command: "tail -f /dev/null"  # Keep the container running
    depends_on:
      - spark-master
    networks:
      - my-network