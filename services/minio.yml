  minio:
    container_name: minio
    build:
      context: ./docker/minio
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}minio/minio:RELEASE.2024-09-09T16-59-28Z
    hostname: minio
    ports:
      # Some Java and JMX (Java Management Extensions) monitoring tools use 9001 as a common port for administrative interfaces.
      - "9002:9000"
      - "9003:9001"
    volumes:
      - ./minio/data:/data
    environment:
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
    networks:
      - trino-network

  minio-client:
    container_name: minio-client
    build:
      context: ./docker/minio-client
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}minio/mc:RELEASE.2024-09-09T07-53-10Z
        MINIO_HOST: http://minio:9000
        MINIO_ACCESS_KEY: minio
        MINIO_SECRET_KEY: minio123
        BUCKET_NAMES: raw-data,processed-data,delta-data,iceberg-data,models,logs,backups  # Define multiple buckets here
    environment:
      - MINIO_HOST=http://minio:9000
      - MINIO_ACCESS_KEY=minio
      - MINIO_SECRET_KEY=minio123
      - BUCKET_NAMES=raw-data,processed-data,delta-data,iceberg-data,models,logs,backups
    networks:
      - trino-network
    depends_on:
      - minio

    