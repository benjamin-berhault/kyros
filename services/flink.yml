
  jobmanager:
    container_name: jobmanager
    build:
      context: ./docker/flink
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}flink:1.17.0-scala_2.12-java11
    ports:
      - "18081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    networks:
      - my-network
    volumes:
      - ./docker/flink/jobs:/opt/flink/jobs

  taskmanager:
    container_name: taskmanager
    build:
      context: ./docker/flink
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}flink:1.17.0-scala_2.12-java11
    depends_on:
      - jobmanager
    command: taskmanager
    scale: 1
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
    networks:
      - my-network
    volumes:
      - ./docker/flink/jobs:/opt/flink/jobs

  sql-client:
    container_name: sql-client
    build:
      context: ./docker/flink
      args:
        IMAGE: ${IF_USING_LOCAL_REGISTRY}flink:1.17.0-scala_2.12-java11
    command: /bin/bash -c "bin/sql-client.sh"
    stdin_open: true
    tty: true
    depends_on:
      - jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        rest.address: jobmanager
    networks:
      - my-network