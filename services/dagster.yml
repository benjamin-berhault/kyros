  dagster:
    container_name: dagster
    build:
      context: ./docker/dagster
      args: 
        IMAGE: ${IF_USING_LOCAL_REGISTRY}python:3.11-slim
    environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        DAGSTER_HOME: /dagster/postcard_company_dm
    volumes:
        - data:/shared
        - ./docker/dagster/postcard_company_dm:/dagster/postcard_company_dm
    ports:
        - "3000:3000"
    command: dagster-webserver -h 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    # depends_on:
    #   generator:
    #     condition: service_completed_successfully
    networks:
      - my-network

