name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: |
          ruff check . --ignore E501 || true

  validate-yaml:
    name: Validate YAML Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate service YAML files
        run: |
          python -c "
          import yaml
          from pathlib import Path
          errors = []
          for f in Path('services').glob('*.yml'):
              try:
                  yaml.safe_load(f.read_text())
                  print(f'✓ {f.name}')
              except yaml.YAMLError as e:
                  errors.append(f'{f.name}: {e}')
                  print(f'✗ {f.name}')
          if errors:
              print('\nErrors:')
              for e in errors:
                  print(e)
              exit(1)
          print('\nAll YAML files valid!')
          "

  validate-presets:
    name: Validate Presets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate preset files
        run: |
          echo "Checking preset files..."
          for level in 0 1 2 3 4; do
            file="presets/level-${level}.env"
            if [ -f "$file" ]; then
              echo "✓ $file exists"
              # Check for required variables
              if grep -q "INCLUDE_POSTGRES" "$file"; then
                echo "  ✓ Contains INCLUDE_POSTGRES"
              else
                echo "  ✗ Missing INCLUDE_POSTGRES"
                exit 1
              fi
            else
              echo "✗ $file missing"
              exit 1
            fi
          done
          echo "All presets valid!"

  docker-compose-validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate docker-compose.yml
        run: |
          # Use level-1 preset for validation
          cp presets/level-1.env .env
          chmod +x generate-docker-compose.sh
          ./generate-docker-compose.sh || true

      - name: Validate docker-compose config
        run: |
          if [ -f docker-compose.yml ]; then
            docker compose config --quiet && echo "✓ docker-compose.yml is valid"
          else
            echo "⚠ docker-compose.yml not generated (may require additional setup)"
          fi

  security-check:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for common secret patterns..."
          # Check for obvious hardcoded passwords (excluding comments and examples)
          if grep -rn "password.*=.*password123\|secret.*=.*secret123" --include="*.env" presets/ 2>/dev/null; then
            echo "⚠ Found potentially weak default passwords"
          else
            echo "✓ No obvious weak passwords found"
          fi

          # Check for AWS keys (should not be in repo)
          if grep -rn "AKIA[A-Z0-9]{16}" . --include="*.env" --include="*.yml" 2>/dev/null; then
            echo "✗ Found potential AWS access key!"
            exit 1
          else
            echo "✓ No AWS keys found"
          fi
